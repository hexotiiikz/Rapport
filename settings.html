<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rédacteurs</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

input {
    padding: 10px;
    width: 300px;
}

button {
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

li {
    margin: 5px 0;
}
</style>
</head>

<body>

<h1>⚙️ Gestion des rédacteurs</h1>

<input id="name" placeholder="Nom du rédacteur">
<button onclick="add()">Ajouter</button>

<h3>Liste :</h3>
<ul id="list"></ul>

<br>
<a href="index.html" style="color:gold;">← Retour</a>

<script>

function load() {
    let list = JSON.parse(localStorage.getItem("redacteurs") || "[]");
    let ul = document.getElementById("list");

    ul.innerHTML = "";

    list.forEach((name, i) => {
        let li = document.createElement("li");
        li.innerHTML = name + " <button onclick='remove("+i+")'>X</button>";
        ul.appendChild(li);
    });
}

function add() {
    let name = document.getElementById("name").value;
    let list = JSON.parse(localStorage.getItem("redacteurs") || "[]");

    list.push(name);
    localStorage.setItem("redacteurs", JSON.stringify(list));

    document.getElementById("name").value = "";
    load();
}

function remove(i) {
    let list = JSON.parse(localStorage.getItem("redacteurs") || "[]");
    list.splice(i, 1);
    localStorage.setItem("redacteurs", JSON.stringify(list));
    load();
}

load();

</script>

</body>
</html>
