<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rapport Sheriff RP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
}

.form {
    width: 40%;
    padding: 20px;
    background: #222;
    height: 100vh;
    overflow-y: auto;
}

h2 {
    color: gold;
}

select, input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

.output {
    width: 60%;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 90vh;
    background: black;
    color: lime;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="form">

<h2>🛡️ Rapport Sheriff</h2>

<!-- EFFECTIFS -->
<select id="effectifs">
    <option>Esther Harrington, LGW-5009</option>
    <option>Arsène Williams, LGW-5545</option>
    <option>Douglas Blackwood, LGW-7776</option>
    <option>Isaac Marshall, LGW-4446</option>
    <option>Theresa Marceau, LGW-6866</option>
    <option>Wambli Ska, LGW-7777</option>
    <option>Lawn Hayes, LGW-7973</option>
    <option>Larry Brown</option>
    <option>Zane Callahan</option>
    <option>Elias Reeds</option>
</select>

<!-- LIEUX -->
<select id="lieu">
    <option>Saint-Denis</option>
    <option>Valentine</option>
    <option>Blackwater</option>
    <option>Rhodes</option>
    <option>Strawberry</option>
    <option>Van Horn</option>
    <option>Emerald</option>
    <option>Macfarlane</option>
    <option>Annesburg</option>
    <option>Armadillo</option>
    <option>Tumbleweed</option>
    <option>Mercer Station</option>
    <option>Riggs Station</option>
    <option>Wallace Station</option>
    <option>Fort Wallace</option>
</select>

<!-- TYPE BRAQUAGE -->
<select id="type">
    <option>Braquage de commerce</option>
    <option>Braquage d'Armurerie</option>
    <option>Braquage de Banque/Fort/Convoi</option>
    <option>Braquage de convoi fédéral</option>
    <option>Attaque sur batiment fédéral</option>
</select>

<!-- GROUPES -->
<select id="groupe">
    <option>European Guys</option>
    <option>Guardia</option>
    <option>Famille Carver</option>
    <option>Meute Rouge</option>
    <option>Guetteurs</option>
    <option>Blood Peek Gang</option>
    <option>The Dock Rats</option>
    <option>Tribu Comanche</option>
    <option>Tribu Toruk</option>
    <option>Frostborn</option>
    <option>Butcher</option>
    <option>The Wellers</option>
    <option>Famille Valmont</option>
</select>

<!-- OTAGES -->
<input id="otages" type="number" placeholder="Nombre d'otages">

<button onclick="generate()">Générer</button>

</div>

<div class="output">
<h2>📄 Rapport</h2>
<textarea id="result"></textarea>
</div>

<script>

function getCharge(type) {
    switch(type) {
        case "Braquage de commerce": return {cash: 20, time: 3};
        case "Braquage d'Armurerie": return {cash: 50, time: 4};
        case "Braquage de Banque/Fort/Convoi": return {cash: 100, time: 10};
        case "Braquage de convoi fédéral": return {cash: 150, time: 15};
        case "Attaque sur batiment fédéral": return {cash: 100, time: 48};
        default: return {cash: 0, time: 0};
    }
}

function generate() {

let e = document.getElementById("effectifs").value;
let l = document.getElementById("lieu").value;
let t = document.getElementById("type").value;
let g = document.getElementById("groupe").value;
let o = parseInt(document.getElementById("otages").value || 0);

let charge = getCharge(t);

let totalCash = charge.cash + (o * 60);
let totalTime = charge.time + (o * 6);

let texte =
`========================
      RAPPORT SHÉRIF
========================

Effectif : ${e}
Lieu : ${l}
Groupe : ${g}

Incident : ${t}

Otages : ${o}

Charges :
- Base → ${charge.cash}$ / ${charge.time}h
- Otages → ${o*60}$ / ${o*6}h

TOTAL :
→ ${totalCash}$ / ${totalTime}h

========================`;

document.getElementById("result").value = texte;
}

</script>

</body>
</html>
