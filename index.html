<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rapport Sheriff RP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
}

.form {
    width: 40%;
    padding: 20px;
    background: #222;
    height: 100vh;
    overflow-y: auto;
}

h2 { color: gold; }

select, input {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
}

.output {
    width: 60%;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 90vh;
    background: black;
    color: lime;
    font-family: monospace;
}
</style>
</head>

<body>

<div class="form">

<h2>🛡️ Rapport Sheriff</h2>

<!-- REDACTEUR -->
<select id="redacteur"></select>

<!-- EFFECTIFS -->
<select id="effectifs"></select>

<!-- LIEUX -->
<select id="lieu"></select>

<!-- SUSPECTS -->
<select id="suspect"></select>

<!-- GROUPES -->
<select id="groupe" onchange="loadMembers()"></select>

<!-- MEMBRES -->
<select id="membres" multiple></select>

<!-- TYPE -->
<select id="type">
    <option>Braquage de commerce</option>
    <option>Braquage d'Armurerie</option>
    <option>Braquage de Banque/Fort/Convoi</option>
    <option>Braquage de convoi fédéral</option>
    <option>Attaque sur batiment fédéral</option>
</select>

<button onclick="generate()">Générer</button>

</div>

<div class="output">
<h2>📄 Rapport</h2>
<textarea id="result"></textarea>
</div>

<script>

function loadData(key, id) {
    let data = JSON.parse(localStorage.getItem(key) || "[]");
    let select = document.getElementById(id);
    select.innerHTML = "";

    data.forEach(v => {
        let opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
    });
}

function loadGroups() {
    let groups = JSON.parse(localStorage.getItem("groupes") || "{}");
    let select = document.getElementById("groupe");
    select.innerHTML = "";

    Object.keys(groups).forEach(g => {
        let opt = document.createElement("option");
        opt.value = g;
        opt.textContent = g;
        select.appendChild(opt);
    });
}

function loadMembers() {
    let groups = JSON.parse(localStorage.getItem("groupes") || "{}");
    let g = document.getElementById("groupe").value;
    let select = document.getElementById("membres");

    select.innerHTML = "";

    (groups[g] || []).forEach(m => {
        let opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        select.appendChild(opt);
    });
}

function generate() {

let r = document.getElementById("redacteur").value;
let e = document.getElementById("effectifs").value;
let l = document.getElementById("lieu").value;
let s = document.getElementById("suspect").value;
let g = document.getElementById("groupe").value;
let m = [...document.getElementById("membres").selectedOptions].map(o => o.value).join(", ");
let t = document.getElementById("type").value;

let date = new Date(1903, new Date().getMonth(), new Date().getDate());

let texte =
`Rédacteur : ${r}

Effectifs : ${e}

Lieu : ${l}

Date : ${date.toLocaleDateString()}

Suspects : ${s}

Groupe : ${g}
Membres : ${m}

----------------------------

Le bureau des shérifs de Valentine a été informé qu’un ${t} avait lieu à ${l}.
`;

document.getElementById("result").value = texte;
}

// LOAD ALL
loadData("redacteurs", "redacteur");
loadData("effectifs", "effectifs");
loadData("lieux", "lieu");
loadData("suspects", "suspect");
loadGroups();

</script>

</body>
</html>
